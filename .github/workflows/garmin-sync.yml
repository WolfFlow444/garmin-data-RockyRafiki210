name: Garmin Sync
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python sync_garmin.py
        env:
          GARMIN_TOKENS_B64: ${{ secrets.GARMIN_TOKENS_B64 }}
      - run: |
          git config user.name "garmin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add garmin_data.json
          git commit -m "sync $(date -u +%F)" || echo "no changes"
          git push
